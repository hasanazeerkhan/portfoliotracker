<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Trichy Portfolio | Gold & Silver</title>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --border: #30363d;
            --gold: #f1c40f; --silver: #58a6ff;
            --up: #3fb950; --down: #f85149; --text: #c9d1d9; --white: #f0f6fc;
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 15px; margin: 0; }
        .container { max-width: 800px; margin: auto; }
        
        .intel-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .badge { background: var(--card); padding: 8px 12px; border-radius: 8px; font-size: 0.7rem; border: 1px solid var(--border); font-weight: 600; }
        .intel-val { color: var(--gold); margin-left: 5px; }

        .header-box { background: linear-gradient(145deg, #1c2128, #161b22); padding: 25px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .val-main { font-size: clamp(2rem, 8vw, 3.2rem); font-weight: 800; color: var(--white); margin: 5px 0; }
        
        .action-row { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; flex-wrap: wrap; gap: 10px; }
        .mode-toggle { background: #000; padding: 4px; border-radius: 10px; display: flex; }
        .mode-btn { border: none; padding: 6px 15px; border-radius: 8px; cursor: pointer; font-size: 0.7rem; font-weight: 700; color: #8b949e; background: transparent; }
        .mode-btn.active { background: var(--gold); color: #000; }
        .btn-fetch { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 8px 15px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 0.7rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); }
        .price-row { display: flex; justify-content: space-between; align-items: flex-end; }
        .price-big { font-size: 2.2rem; font-weight: 700; color: var(--white); margin: 5px 0; }
        
        .input-area { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        input { background: #0d1117; border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: 6px; width: 70px; text-align: center; outline: none; }
        
        .gain { color: var(--up); } .loss { color: var(--down); }
        .label { font-size: 0.6rem; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
        .shift-val { font-weight: 700; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="intel-bar">
        <div class="badge">RATIO: <span id="r-val" class="intel-val">0</span> <span id="r-s" style="font-size: 0.6rem;"></span></div>
        <div class="badge">ADVICE: <span id="advice" class="intel-val">---</span></div>
        <div class="badge" id="date-loc" style="margin-left:auto">LOADING...</div>
    </div>

    <div class="header-box">
        <div id="val-label" class="label">Estimated Buy Value</div>
        <div id="total-val" class="val-main">₹0</div>
        <div id="total-shift" class="shift-val">₹0 (Daily Change)</div>
        <div class="action-row">
            <div class="mode-toggle">
                <button id="btn-buy" class="mode-btn active" onclick="setMode('buy')">BUY</button>
                <button id="btn-sell" class="mode-btn" onclick="setMode('sell')">SELL</button>
            </div>
            <button class="btn-fetch" onclick="refresh()">FETCH LATEST</button>
        </div>
    </div>

    <div class="grid">
        <div class="card" style="border-top: 3px solid var(--gold)">
            <div class="label">24K Gold / gram</div>
            <div class="price-row">
                <div id="gp" class="price-big">₹0</div>
                <div id="g-mkt" style="font-size: 0.8rem; font-weight: 600;">₹0</div>
            </div>
            <div class="input-area">
                <div><label class="label">Weight (g)</label><br><input type="number" id="gw" oninput="calc()"></div>
                <div style="text-align:right">
                    <label class="label">Valuation</label>
                    <div id="gv" style="font-weight:700; color: var(--white);">₹0</div>
                    <div id="gs" class="shift-val" style="font-size: 0.75rem;">₹0</div>
                </div>
            </div>
        </div>

        <div class="card" style="border-top: 3px solid var(--silver)">
            <div class="label">Silver / gram</div>
            <div class="price-row">
                <div id="sp" class="price-big">₹0</div>
                <div id="s-mkt" style="font-size: 0.8rem; font-weight: 600;">₹0</div>
            </div>
            <div class="input-area">
                <div><label class="label">Weight (g)</label><br><input type="number" id="sw" oninput="calc()"></div>
                <div style="text-align:right">
                    <label class="label">Valuation</label>
                    <div id="sv" style="font-weight:700; color: var(--white);">₹0</div>
                    <div id="ss" class="shift-val" style="font-size: 0.75rem;">₹0</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let d = null; let mode = 'buy';
    window.onload = () => {
        document.getElementById('gw').value = localStorage.getItem('gw') || '0';
        document.getElementById('sw').value = localStorage.getItem('sw') || '0';
        refresh();
    };
    function setMode(m) {
        mode = m;
        document.getElementById('btn-buy').classList.toggle('active', m === 'buy');
        document.getElementById('btn-sell').classList.toggle('active', m === 'sell');
        document.getElementById('val-label').innerText = m === 'buy' ? 'Estimated Buy Value' : 'Liquidation Value (Sell)';
        calc();
    }
    async function refresh() {
        try {
            const res = await fetch('/.netlify/functions/rates');
            d = await res.json();
            document.getElementById('date-loc').innerText = `${d.date.toUpperCase()} • TRICHY`;
            const r = parseFloat(d.ratio); const rs = r - parseFloat(d.ratioYesterday);
            document.getElementById('r-val').innerText = r.toFixed(2);
            document.getElementById('r-s').innerText = `${rs >= 0 ? '+' : ''}${rs.toFixed(2)}`;
            document.getElementById('r-s').className = rs >= 0 ? 'gain' : 'loss';
            document.getElementById('advice').innerText = r < 60 ? "BUY GOLD" : (r > 80 ? "BUY SILVER" : "HOLD");
            calc();
        } catch (e) { console.error("Function Error"); }
    }
    function calc() {
        if (!d) return;
        const gw = parseFloat(document.getElementById('gw').value) || 0;
        const sw = parseFloat(document.getElementById('sw').value) || 0;
        localStorage.setItem('gw', gw); localStorage.setItem('sw', sw);
        const ag = mode === 'buy' ? d.gold.buy : d.gold.sell;
        const as = mode === 'buy' ? d.silver.buy : d.silver.sell;
        fmt('g-mkt', d.gold.mktChange, "/g"); fmt('s-mkt', d.silver.mktChange, "/g");
        const gS = d.gold.mktChange * gw; const sS = d.silver.mktChange * sw;
        document.getElementById('gp').innerText = `₹${ag.toLocaleString('en-IN')}`;
        document.getElementById('sp').innerText = `₹${as.toLocaleString('en-IN')}`;
        document.getElementById('gv').innerText = `₹${(gw * ag).toLocaleString('en-IN')}`;
        document.getElementById('sv').innerText = `₹${(sw * as).toLocaleString('en-IN')}`;
        document.getElementById('total-val').innerText = `₹${((gw * ag) + (sw * as)).toLocaleString('en-IN')}`;
        fmt('gs', gS); fmt('ss', sS); fmt('total-shift', gS + sS, "(Daily Shift)");
    }
    function fmt(id, v, suf = "") {
        const el = document.getElementById(id); const s = v >= 0 ? '+' : '-';
        el.className = `shift-val ${v >= 0 ? 'gain' : 'loss'}`;
        el.innerText = `${s}₹${Math.abs(v).toLocaleString('en-IN')} ${suf}`;
    }
</script>
</body>
</html>
